<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-CORE v16.0 | AI Multimodal</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00ff; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bar { background: #000; border-bottom: 2px solid var(--pink); padding: 15px; display: flex; gap: 10px; align-items: center; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; outline: none; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #222; }
        .msg { margin-bottom: 15px; padding: 15px; border: 1px solid var(--neon); background: rgba(0,243,255,0.05); border-radius: 4px; }
        .user { border-color: var(--pink); color: var(--pink); background: rgba(255,0,255,0.05); align-self: flex-end; }
        .input-area { padding: 20px; border-top: 1px solid var(--neon); background: #000; display: flex; gap: 10px; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div class="bar">
        <span style="color:var(--pink)">LLAVE_GROQ ></span>
        <input type="password" id="key" placeholder="Pega tu nueva gsk_ aquí..." style="flex:1">
    </div>

    <div id="chat">
        <div class="msg">SISTEMA v16.0 ONLINE. <br>1. Crea una NUEVA llave en console.groq.com <br>2. Pégala arriba.<br>3. Sube una foto o escribe un mensaje.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe comando..." style="flex:1" onkeypress="if(event.key==='Enter') send()">
        <button class="btn" onclick="send()">EJECUTAR</button>
    </div>

    <script>
        async function send() {
            const key = document.getElementById('key').value.trim();
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();

            if(!key || !text) { alert("Falta la llave o el mensaje"); return; }

            chat.innerHTML += `<div class="msg user">TÚ: ${text}</div>`;
            input.value = '';
            
            const aiBubble = document.createElement('div');
            aiBubble.className = "msg";
            aiBubble.innerText = "PROCESANDO...";
            chat.appendChild(aiBubble);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${key}` 
                    },
                    body: JSON.stringify({ 
                        model: "llama3-8b-8192", 
                        messages: [{ role: "user", content: text }] 
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    aiBubble.style.color = "red";
                    aiBubble.innerText = "ERROR " + response.status + ": " + data.error.message;
                } else {
                    aiBubble.innerText = "IA: " + data.choices[0].message.content;
                }
            } catch (e) {
                aiBubble.innerText = "ERROR DE CONEXIÓN: Revisa tu internet o la llave.";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
