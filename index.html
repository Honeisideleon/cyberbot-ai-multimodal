<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA TERMINAL FINAL</title>
    <style>
        body { background: #050505; color: #00f3ff; font-family: monospace; padding: 20px; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .bar { background: #000; border-bottom: 2px solid #ff00ff; padding: 10px; display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00f3ff; color: #00f3ff; padding: 10px; outline: none; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid #333; margin: 10px 0; }
        .msg { margin-bottom: 15px; padding: 10px; border: 1px solid #444; }
        .user { border-color: #ff00ff; color: #ff00ff; }
        .input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="bar">
        <span>LLAVE_GROQ ></span>
        <input type="text" id="key" placeholder="Pega tu gsk_ aquí..." style="flex:1">
    </div>
    <div id="chat">
        <div class="msg">SISTEMA LISTO. <br>1. Ve a console.groq.com y crea tu llave.<br>2. Pégala arriba.<br>3. Escribe un mensaje abajo.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe aquí..." style="flex:1" onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:#00f3ff; border:none; padding:10px; cursor:pointer;">ENVIAR</button>
    </div>

    <script>
        async function send() {
            const key = document.getElementById('key').value.trim();
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if(!key || !input.value) return;

            const text = input.value;
            chat.innerHTML += `<div class="msg user">TÚ: ${text}</div>`;
            input.value = '';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: text }] })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                chat.innerHTML += `<div class="msg">IA: ${aiMsg}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg" style="color:red">ERROR: Revisa tu llave gsk_</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
