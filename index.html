<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE DIAGNÓSTICO IA</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #ff00ff; padding: 20px; margin-bottom: 20px; background: rgba(255,0,255,0.05); }
        input { width: 100%; background: #000; border: 1px solid #00f3ff; color: #00f3ff; padding: 10px; margin: 10px 0; }
        button { background: #ff00ff; border: none; color: #000; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #error-output { color: #ff5555; font-weight: bold; margin-top: 20px; border: 1px solid red; padding: 10px; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>PASO 1: PEGA TU API KEY</h3>
        <input type="password" id="key" placeholder="AIzaSy...">
    </div>

    <div class="box">
        <h3>PASO 2: PRUEBA DE CONEXIÓN</h3>
        <button onclick="testIA()">PROBAR CONEXIÓN CON GOOGLE</button>
    </div>

    <div id="log">Esperando prueba...</div>
    <div id="error-output"></div>

    <script>
        async function testIA() {
            const key = document.getElementById('key').value.trim();
            const log = document.getElementById('log');
            const errBox = document.getElementById('error-output');

            if(!key) { alert("Pega la llave primero"); return; }

            log.innerText = "Sincronizando con Google...";
            errBox.style.display = 'none';

            // Probaremos la URL más estándar y estable de Google
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Hola" }] }] })
                });

                const data = await response.json();

                if (response.ok) {
                    log.innerHTML = "<h2 style='color:#00ff00'>¡ÉXITO! Google respondió:</h2>" + data.candidates[0].content.parts[0].text;
                } else {
                    // ESTO ES LO QUE NECESITO VER
                    errBox.style.display = 'block';
                    errBox.innerHTML = `<h3>ERROR DETECTADO:</h3>
                                        <p>Código: ${response.status}</p>
                                        <p>Mensaje de Google: ${data.error ? data.error.message : 'No hay mensaje'}</p>
                                        <p>Razón: ${data.error ? data.error.status : 'Desconocida'}</p>`;
                }
            } catch (e) {
                errBox.style.display = 'block';
                errBox.innerText = "ERROR DE RED: No se pudo llegar a Google. Revisa tu internet.";
            }
        }
    </script>
</body>
</html>
