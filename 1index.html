<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-CORE v13.0 | Núcleo Universal</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00ff; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; height: 100vh; 
            display: flex; overflow: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0.1) 50%, transparent 50%);
            background-size: 100% 4px;
        }
        .security-bar { position: absolute; top: 0; width: 100%; background: #000; border-bottom: 2px solid var(--pink); padding: 10px; z-index: 1000; display: flex; gap: 10px; }
        .security-bar input { background: #000; border: 1px solid var(--pink); color: var(--pink); flex: 1; padding: 5px; outline: none; }
        .sidebar { width: 250px; border-right: 1px solid var(--neon); padding: 60px 20px; display: flex; flex-direction: column; gap: 20px; font-size: 0.8rem; background: rgba(0,243,255,0.02); }
        .main { flex: 1; display: flex; flex-direction: column; padding-top: 50px; }
        #chat-log { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 2px; font-size: 0.9rem; line-height: 1.4; border: 1px solid var(--neon); }
        .user-msg { align-self: flex-end; border-color: var(--pink); color: var(--pink); }
        .input-area { padding: 20px; border-top: 1px solid var(--neon); background: #000; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: transparent; border: 1px solid var(--neon); padding: 10px; color: var(--neon); outline: none; }
        .btn { border: 1px solid var(--neon); background: transparent; color: var(--neon); padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="security-bar">
        <span style="color:var(--pink); font-weight:bold;">> SISTEMA_v13.0:</span>
        <input type="password" id="apiKeyInput" placeholder="Pega aquí tu llave de Groq (gsk_) o Google (AIza_)..." onchange="saveKey()">
    </div>

    <div class="sidebar">
        <div style="border:1px solid var(--neon); padding:10px;">
            <p style="color:var(--pink)">> ESTADO</p>
            <p id="status-text">ESPERANDO LLAVE...</p>
        </div>
        <div style="border:1px solid var(--neon); padding:10px;">
            <p style="color:var(--pink)">> MOTOR_DETECTADO</p>
            <p id="active-engine">NINGUNO</p>
        </div>
    </div>

    <div class="main">
        <div id="chat-log">
            <div class="bubble ai-msg">SISTEMA UNIVERSAL v13.0. Pega tu llave (Groq o Google) en la barra rosa y presiona ENTER.</div>
        </div>
        <div class="input-area">
            <div class="controls">
                <input type="text" id="userInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">EJECUTAR</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const key = localStorage.getItem('master_key_universal');
            if (key) {
                document.getElementById('apiKeyInput').value = key;
                document.getElementById('status-text').innerText = "NÚCLEO_LISTO";
            }
        };

        function saveKey() {
            localStorage.setItem('master_key_universal', document.getElementById('apiKeyInput').value.trim());
            document.getElementById('status-text').innerText = "NÚCLEO_LISTO";
            alert("LLAVE GUARDADA.");
        }

        async function sendMessage() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!key || !text) return;

            appendMsg('user', text);
            input.value = '';
            const aiMsg = appendMsg('ai', 'CONECTANDO CON EL MOTOR...');

            // --- ESTO ES LO QUE DETECTA TU LLAVE NUEVA ---
            if (key.startsWith('gsk_')) {
                document.getElementById('active-engine').innerText = "GROQ_LLAMA3";
                await callGroq(key, text, aiMsg);
            } else {
                document.getElementById('active-engine').innerText = "GOOGLE_GEMINI";
                await callGemini(key, text, aiMsg);
            }
        }

        async function callGroq(key, text, aiMsg) {
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: text }] })
                });
                const data = await response.json();
                if (data.choices) {
                    aiMsg.innerText = data.choices[0].message.content;
                } else {
                    aiMsg.innerText = "ERROR EN GROQ: " + data.error.message;
                }
            } catch (err) {
                aiMsg.innerText = "ERROR DE CONEXIÓN CON GROQ.";
            }
        }

        async function callGemini(key, text, aiMsg) {
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                if (data.candidates) {
                    aiMsg.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    aiMsg.innerText = "ERROR EN GOOGLE: " + data.error.message;
                }
            } catch (e) {
                aiMsg.innerText = "ERROR DE CONEXIÓN CON GOOGLE.";
            }
        }

        function appendMsg(role, text) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = `bubble ${role}-msg`;
            div.innerText = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
