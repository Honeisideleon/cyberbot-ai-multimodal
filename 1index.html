<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-CORE v14.0 | IA LIBERAL</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00ff; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 20px;
        }
        /* BARRA DE LLAVE */
        .key-bar { background: #000; border-bottom: 2px solid var(--pink); padding: 12px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        .key-bar input { background: #000; border: 1px solid var(--pink); color: var(--pink); flex: 1; padding: 8px; outline: none; }
        
        #chat-log { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 15px; border: 1px solid var(--neon); background: rgba(0, 243, 255, 0.05); line-height: 1.5; position: relative; }
        .user-bubble { align-self: flex-end; border-color: var(--pink); color: var(--pink); background: rgba(255, 0, 255, 0.05); }
        
        .input-panel { padding: 20px; border-top: 1px solid var(--neon); background: #000; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: transparent; border: 1px solid var(--neon); padding: 12px; color: var(--neon); outline: none; }
        .btn { border: 1px solid var(--neon); background: transparent; color: var(--neon); padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        #preview { height: 50px; border: 1px solid var(--pink); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="key-bar">
        <span style="color:var(--pink); font-weight:bold;">SISTEMA_KEY ></span>
        <input type="password" id="apiKeyInput" placeholder="Pega tu llave aquí (Groq gsk_  o Google AIza_)..." onchange="saveKey()">
    </div>

    <div id="chat-log">
        <div class="bubble">TERMINAL v14.0 LISTA. <br>1. Consiga una llave gsk_ en console.groq.com (Recomendado). <br>2. Péguela arriba y presione ENTER.</div>
    </div>

    <div class="input-panel">
        <img id="preview" src="">
        <div class="controls">
            <button class="btn" style="border-color:var(--pink); color:var(--pink);" onclick="document.getElementById('fileInput').click()">IMG</button>
            <input type="file" id="fileInput" hidden accept="image/*">
            <input type="text" id="userInput" placeholder="Escribe un comando..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">EJECUTAR</button>
        </div>
    </div>

    <script>
        // Carga automática de la llave
        window.onload = () => {
            const savedKey = localStorage.getItem('universal_key_v14');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        };

        function saveKey() {
            localStorage.setItem('universal_key_v14', document.getElementById('apiKeyInput').value.trim());
            alert("SISTEMA SINCRONIZADO.");
        }

        let base64Img = null;
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    document.getElementById('preview').src = evt.target.result;
                    document.getElementById('preview').style.display = 'block';
                    base64Img = evt.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        async function sendMessage() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!key || (!text && !base64Img)) return;

            appendMsg('user', text || "[ANÁLISIS_VISUAL]");
            input.value = '';
            const aiMsg = appendMsg('ai', 'PROCESANDO...');

            // --- LÓGICA DE DETECCIÓN AUTOMÁTICA ---
            try {
                if (key.startsWith('gsk_')) {
                    await callGroq(key, text, aiMsg);
                } else {
                    await callGemini(key, text, aiMsg);
                }
            } catch (err) {
                aiMsg.innerText = "ERROR CRÍTICO: Verifique que su llave sea válida.";
            }

            base64Img = null;
            document.getElementById('preview').style.display = 'none';
        }

        // MOTOR GROQ (El más liberal y rápido)
        async function callGroq(key, text, aiMsg) {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ 
                    model: "llama3-8b-8192", 
                    messages: [{ role: "user", content: text }] 
                })
            });
            const data = await response.json();
            aiMsg.innerText = data.choices ? data.choices[0].message.content : "Error en Groq: " + data.error.message;
        }

        // MOTOR GOOGLE (Para imágenes)
        async function callGemini(key, text, aiMsg) {
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: text || "¿Qué hay en la imagen?" },
                            ...(base64Img ? [{ inline_data: { mime_type: "image/jpeg", data: base64Img } }] : [])
                        ]
                    }]
                })
            });
            const data = await response.json();
            aiMsg.innerText = data.candidates ? data.candidates[0].content.parts[0].text : "Error en Google: " + data.error.message;
        }

        function appendMsg(role, text) {
            const log = document.getElementById('chat-log');
            const div = document.createElement('div');
            div.className = `bubble ${role}-bubble`;
            div.innerText = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
